server.port=8080

# JWT
jwt.secret=textfighter-secret-key-must-be-256bits-long-enough
jwt.expiration=3600000

# H2 파일 DB (JpaManager와 동일한 경로, AUTO_SERVER=TRUE로 다중 접속 허용)
spring.datasource.url=jdbc:h2:./saves/textfighter;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 웹 콘솔 (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring의 JPA 자동설정 비활성화 (JpaManager/persistence.xml이 이미 처리)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
